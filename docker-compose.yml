services:
  postgres:
    image: postgres:16-alpine
    container_name: veles-postgres
    environment:
      POSTGRES_USER: veles
      POSTGRES_PASSWORD: veles_secret
      POSTGRES_DB: veles
    ports:
      - "5432:5432"
    volumes:
      - veles_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veles -d veles"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  veles_pg_data:
